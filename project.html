<!DOCTYPE html>
<html lang="en" style="margin:0; overflow:hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Right Hand Exclusive - 3D Particle Universe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Avenir', 'Inter', system-ui, -apple-system, sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 40px;
            pointer-events: none;
            z-index: 20;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-left: 3px solid #ff3366;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 13px;
            color: #0f0;
            pointer-events: none;
            z-index: 20;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .instruction {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ddd;
            font-family: monospace;
            pointer-events: none;
            z-index: 20;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; bottom: 10px; left: 10px; padding: 6px 12px; }
            #status { font-size: 10px; bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ COSMIC HANDSCAPE | RIGHT HAND EXCLUSIVE TRACKING ✨<br>
        <span style="font-size:11px; opacity:0.8;">Move your right hand → navigate the particle universe | Pinch → warp field intensity</span>
    </div>
    <div id="status">
        🟢 RIGHT HAND ACTIVE
    </div>
    <div class="instruction">
        🖐️ RIGHT HAND ONLY | MediaPipe
    </div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <!-- MediaPipe libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --------------------------------------------------------------
        // 1. SETUP SCENE, CAMERA, RENDERER (HIGH PERFORMANCE)
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010115);
        scene.fog = new THREE.FogExp2(0x010115, 0.00035); // subtle fog for depth

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(12, 6, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // Post-processing bloom for ethereal glow
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.65;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // subtle starfield background (static)
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 400;
            starPositions[i*3+1] = (Math.random() - 0.5) * 200;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 70;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.6 });
        const starsField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starsField);
        
        // --------------------------------------------------------------
        // 2. PARTICLE SYSTEM: "OBSERVABLE UNIVERSE / NEBULAR SWIRL"
        //    High particle count with dynamic color & lerp smoothing.
        //    Decoupled physics: only visual rotation / breathing via time.
        // --------------------------------------------------------------
        const PARTICLE_COUNT = 28000;
        const geometry = new THREE.BufferGeometry();
        
        // positions array
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        // colors array
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        
        // Generate particles in a toroidal / spherical hybrid with layered arms (cosmic style)
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // Mix of spherical distribution + spiral arm hints
            const choice = Math.random();
            let radius, theta, phi;
            if (choice < 0.65) {
                // Main disc / torus influenced zone
                radius = 5.5 + Math.pow(Math.random(), 1.2) * 7.5;
                theta = Math.random() * Math.PI * 2;
                const armOffset = Math.sin(theta * 5) * 1.2;
                const radialVar = radius + armOffset * 1.2;
                phi = Math.sin(theta * 3) * 0.8 + (Math.random() - 0.5) * 0.9;
                const x = Math.cos(theta) * radialVar;
                const z = Math.sin(theta) * radialVar;
                const y = Math.sin(phi * 1.8) * 2.2 + Math.cos(theta * 4) * 1.2;
                positions[i*3] = x;
                positions[i*3+1] = y * 1.4;
                positions[i*3+2] = z;
            } else {
                // outer halo / globular clusters
                radius = 11 + Math.random() * 6;
                theta = Math.random() * Math.PI * 2;
                phi = Math.acos(2 * Math.random() - 1);
                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta) * 0.6;
                const z = radius * Math.cos(phi) * 1.2;
                positions[i*3] = x;
                positions[i*3+1] = y;
                positions[i*3+2] = z;
            }
            
            // vibrant colors based on radius and angle
            const rPos = Math.sqrt(positions[i*3]*positions[i*3] + positions[i*3+1]*positions[i*3+1] + positions[i*3+2]*positions[i*3+2]);
            const hue = (Math.atan2(positions[i*3+2], positions[i*3]) + Math.PI) / (2 * Math.PI);
            let rCol = 0.4 + 0.6 * Math.sin(hue * Math.PI * 2);
            let gCol = 0.3 + 0.7 * Math.cos(hue * Math.PI * 2 + 2.0);
            let bCol = 0.6 + 0.4 * Math.sin(hue * Math.PI * 3 + 1.2);
            
            // emphasize inner region with cyan/magenta
            if (rPos < 6) {
                rCol = 0.8 + Math.random()*0.2;
                gCol = 0.3 + Math.random()*0.4;
                bCol = 0.9 + Math.random()*0.1;
            } else if (rPos > 12) {
                rCol = 0.5 + Math.random()*0.3;
                gCol = 0.4 + Math.random()*0.4;
                bCol = 0.9;
            }
            
            colors[i*3] = rCol;
            colors[i*3+1] = gCol;
            colors[i*3+2] = bCol;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const particleMaterial = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.95 });
        const particleSystem = new THREE.Points(geometry, particleMaterial);
        scene.add(particleSystem);
        
        // Add a central glowing core (subtle)
        const coreGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.85, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0x441133, emissiveIntensity: 1.2, roughness: 0.3 })
        );
        scene.add(coreGlow);
        
        // Ambient + point light to enhance depth
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff88aa, 0.8, 40);
        pointLight.position.set(3, 5, 4);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0x2266ff, 0.5);
        backLight.position.set(-4, 2, -6);
        scene.add(backLight);
        
        // optional: faint wireframe rings (cosmetic)
        const ringGeo = new THREE.TorusGeometry(7.2, 0.05, 128, 300);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x66aaff, emissive: 0x224466, transparent: true, opacity: 0.2 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        // --------------------------------------------------------------
        // 3. LERP SMOOTHING & DECOUPLED PHYSICS (rotational drift & breathing)
        //    Visual motion independent from hand tracking logic.
        // --------------------------------------------------------------
        let timeAcc = 0;
        let targetRotationY = 0;
        let currentRotationY = 0;
        let targetRotationX = 0;
        let currentRotationX = 0;
        let baseBreathing = 0;
        
        // Hand tracking state (Right Hand Exclusive)
        let handPresent = false;
        let handX = 0;      // normalized -1..1
        let handY = 0;
        let handPinch = 0;   // 0..1 strength
        
        // smoothing for hand-driven parameters (lerp)
        let smoothHandX = 0;
        let smoothHandY = 0;
        let smoothPinch = 0;
        
        // physics-like independent rotation: gentle auto-spin when no hand, but hand overrides target
        let autoSpin = 0.002;
        
        // additional floating particles secondary (cosmic dust) - small layer for richness
        const dustCount = 8000;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPositions[i*3] = (Math.random() - 0.5) * 35;
            dustPositions[i*3+1] = (Math.random() - 0.5) * 20;
            dustPositions[i*3+2] = (Math.random() - 0.5) * 30;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const dustLayer = new THREE.Points(dustGeo, dustMat);
        scene.add(dustLayer);
        
        // --------------------------------------------------------------
        // 4. RIGHT HAND EXCLUSIVE TRACKING - MediaPipe onResults modified
        //    Strictly process only right hand landmarks.
        // --------------------------------------------------------------
        const videoElement = document.createElement('video');
        videoElement.style.display = 'none';
        document.body.appendChild(videoElement);
        
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });
        
        hands.setOptions({
            maxNumHands: 1,          // only need one hand, but we enforce right hand logic
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        // Helper: get pinch strength between thumb tip and index tip
        function getPinchStrength(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const dx = thumbTip.x - indexTip.x;
            const dy = thumbTip.y - indexTip.y;
            const dz = thumbTip.z - indexTip.z;
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
            // distance range typical: 0.02 to 0.2 -> map to 0..1 inverse (closer = stronger)
            let strength = 1 - Math.min(1, Math.max(0, (dist - 0.02) / 0.18));
            return strength;
        }
        
        // RIGHT HAND EXCLUSIVE: callback filters only right hand
        hands.onResults((results) => {
            // CRITICAL: Process ONLY the Right Hand
            let rightHandLandmarks = null;
            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const handedness = results.multiHandedness[i].label;
                    if (handedness === 'Right') {
                        rightHandLandmarks = results.multiHandLandmarks[i];
                        break;  // take first right hand only
                    }
                }
            }
            
            if (rightHandLandmarks) {
                handPresent = true;
                // Get wrist (landmark 0) for position mapping to X/Y (normalized screen space -> -1..1 range)
                const wrist = rightHandLandmarks[0];
                // Map x: 0..1 -> -1..1, y: 0..1 -> -1..1 but inverted Y for natural mapping
                const rawX = (wrist.x * 2) - 1;
                const rawY = 1 - (wrist.y * 2);
                // Clamp and update
                handX = Math.min(0.95, Math.max(-0.95, rawX));
                handY = Math.min(0.95, Math.max(-0.95, rawY));
                // pinch strength from right hand
                handPinch = getPinchStrength(rightHandLandmarks);
                // optional: update status indicator
                document.getElementById('status').style.color = '#aaffaa';
                document.getElementById('status').innerHTML = '🟢 RIGHT HAND ACTIVE | PINCH: ' + handPinch.toFixed(2);
            } else {
                handPresent = false;
                // smoothly fade out hand influence
                handX = 0;
                handY = 0;
                handPinch = 0;
                document.getElementById('status').style.color = '#ff8888';
                document.getElementById('status').innerHTML = '⚫ RIGHT HAND NOT DETECTED';
            }
        });
        
        // Initialize camera
        const cameraUtils = window.CameraUtils;
        const cameraObj = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraObj.start();
        
        // --------------------------------------------------------------
        // 5. ANIMATION LOOP: LERP SMOOTHING, DECOUPLED VISUAL EFFECTS
        //    Hand input modifies target rotation & field intensity (pinch)
        //    No physics coupling: particles rotate globally, independent drift.
        // --------------------------------------------------------------
        let clock = new THREE.Clock();
        
        function animate() {
            const delta = Math.min(clock.getDelta(), 0.033);
            const elapsedTime = performance.now() * 0.001;
            
            // LERP smoothing for hand-driven parameters (smooth transitions)
            const lerpFactor = 0.08;
            smoothHandX += (handX - smoothHandX) * lerpFactor;
            smoothHandY += (handY - smoothHandY) * lerpFactor;
            smoothPinch += (handPinch - smoothPinch) * lerpFactor;
            
            // 1. DECOUPLED VISUAL ROTATION: target rotation based on hand position + subtle auto-rotation
            //    hand influence: maps hand X to Y rotation offset, hand Y to X rotation offset
            let targetRotY = 0;
            let targetRotX = 0;
            if (handPresent) {
                // Map smooth hand coordinates to rotation angles: -1.2 .. 1.2 rad
                targetRotY = smoothHandX * 1.5;
                targetRotX = smoothHandY * 0.9;
                // auto-spin contribution reduced when hand is active to prioritize control
                autoSpin = 0.0008;
            } else {
                // gentle cosmic drift when no hand
                targetRotY = Math.sin(elapsedTime * 0.12) * 0.6;
                targetRotX = Math.sin(elapsedTime * 0.2) * 0.3;
                autoSpin = 0.0022;
            }
            
            // Add continuous auto-spin independent of hand (decoupled physics-like)
            targetRotY += autoSpin * (1 - Math.abs(smoothHandX) * 0.5);
            
            // LERP rotation for cinematic smoothness
            currentRotationY += (targetRotY - currentRotationY) * 0.045;
            currentRotationX += (targetRotX - currentRotationX) * 0.045;
            
            // Apply rotation to the main particle system, dust, and ring (visual core)
            particleSystem.rotation.y = currentRotationY;
            particleSystem.rotation.x = currentRotationX;
            dustLayer.rotation.y = currentRotationY * 0.7;
            dustLayer.rotation.x = currentRotationX * 0.5;
            ring.rotation.z = currentRotationY * 0.4;
            ring.rotation.x = Math.PI / 2 + currentRotationX * 0.2;
            
            // 2. BREATHING & PULSE EFFECT (decoupled physics, driven by time & pinch)
            //    Global scale / intensity based on smooth pinch + sine wave
            const breathSine = Math.sin(elapsedTime * 0.9) * 0.03;
            let scaleFactor = 1 + breathSine * 0.5;
            // pinch influence: increase scale/warp intensity (visual expansion)
            const pinchInfluence = smoothPinch * 0.22;
            scaleFactor += pinchInfluence;
            particleSystem.scale.setScalar(1 + breathSine * 0.08 + pinchInfluence * 0.1);
            dustLayer.scale.setScalar(1 + breathSine * 0.05);
            
            // 3. COLOR/BLOOM INTENSITY response to pinch (makes universe "warp")
            const bloomStrength = 0.65 + smoothPinch * 0.6;
            bloomPass.strength = Math.min(1.2, bloomStrength);
            
            // 4. Central core pulse based on pinch and time
            const coreIntensity = 0.9 + Math.sin(elapsedTime * 3) * 0.2 + smoothPinch * 0.8;
            coreGlow.material.emissiveIntensity = coreIntensity;
            
            // 5. Point light movement subtle in response to hand (visual flair)
            if (handPresent) {
                pointLight.position.x = 3 + smoothHandX * 1.8;
                pointLight.position.y = 5 + smoothHandY * 1.2;
                pointLight.intensity = 0.7 + smoothPinch * 0.6;
            } else {
                pointLight.position.x = 3 + Math.sin(elapsedTime * 0.5) * 1;
                pointLight.position.y = 5 + Math.cos(elapsedTime * 0.7) * 0.8;
                pointLight.intensity = 0.7;
            }
            
            // camera subtle orbit parallax (gentle cinematic movement)
            const camOffsetX = smoothHandX * 1.2;
            const camOffsetY = smoothHandY * 0.6;
            const targetCamX = 12 + camOffsetX;
            const targetCamY = 6 + camOffsetY;
            camera.position.x += (targetCamX - camera.position.x) * 0.04;
            camera.position.y += (targetCamY - camera.position.y) * 0.04;
            camera.lookAt(0, 0, 0);
            
            // render via effect composer
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        // start animation
        animate();
        
        // handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // small console confirmation
        console.log('3D Particle Universe | Right Hand Exclusive Tracking Active');
        
        // optional: tiny helper to keep mediapipe visible log
        setTimeout(() => {
            if (!handPresent) console.log('Waiting for right hand... show your right hand to the camera');
        }, 1500);
    </script>
</body>
</html>
