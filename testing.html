<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Perf 3D Particle Visualizer - Right Hand Exclusive</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">SYSTEM STATUS: ACTIVE<br>TRACKING: RIGHT HAND ONLY</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // --- PARTICLE CONFIG (Solar System / Universe Logic) ---
        const PARTICLE_COUNT = 1500;
        const particles = [];
        const mouse = { x: 0, y: 0, active: false };
        const lerpTarget = { x: 0, y: 0 };
        const LERP_FACTOR = 0.15; // Smooth movement factor

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles.length = 0;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    z: Math.random() * 1000,
                    ox: Math.random() * width,
                    oy: Math.random() * height,
                    oz: Math.random() * 1000,
                    vx: 0, vy: 0, vz: 0,
                    color: `hsl(${Math.random() * 50 + 200}, 80%, 60%)`
                });
            }
        }

        // --- PHYSICS & RENDERING (The "Perfect" Logic - Unchanged) ---
        function update() {
            // Decoupled Lerp Smoothing
            mouse.x += (lerpTarget.x - mouse.x) * LERP_FACTOR;
            mouse.y += (lerpTarget.y - mouse.y) * LERP_FACTOR;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            for (let p of particles) {
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const force = mouse.active ? (150 / (dist + 1)) : 0;

                // Physics Influence
                p.vx += (dx / dist) * force + (p.ox - p.x) * 0.01;
                p.vy += (dy / dist) * force + (p.oy - p.y) * 0.01;
                
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.92;
                p.vy *= 0.92;

                // 3D Projection
                const scale = 600 / (600 + p.z);
                const rx = (p.x - width / 2) * scale + width / 2;
                const ry = (p.y - height / 2) * scale + height / 2;

                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(rx, ry, scale * 2, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(update);
        }

        // --- MEDIAPIPE LOGIC (Modified for Right Hand Exclusion) ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            // CRITICAL: Filter for Right Hand only
            let rightHandIndex = -1;

            if (results.multiHandedness && results.multiHandedness.length > 0) {
                results.multiHandedness.forEach((hand, index) => {
                    // Note: MediaPipe labels are often mirrored depending on camera feed. 
                    // 'Right' refers to the hand identified as the user's right hand.
                    if (hand.label === 'Right') {
                        rightHandIndex = index;
                    }
                });
            }

            if (rightHandIndex !== -1 && results.multiHandLandmarks[rightHandIndex]) {
                const landmark = results.multiHandLandmarks[rightHandIndex][9]; // Middle finger MCP
                lerpTarget.x = (1 - landmark.x) * width; // Mirrored for natural feel
                lerpTarget.y = landmark.y * height;
                mouse.active = true;
            } else {
                mouse.active = false;
            }
        });

        const camera = new Camera(document.createElement('video'), {
            onFrame: async () => {
                await hands.send({ image: camera.video });
            },
            width: 640,
            height: 480
        });

        window.addEventListener('resize', init);
        init();
        camera.start();
        update();
    </script>
</body>
</html>
